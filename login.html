<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | SGIPC</title>
    <meta name="description" content="Admin login for SGIPC event management." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #f6edf9 0%, #ffffff 45%, #f9f2fd 100%);
      }

      .login-shell {
        width: min(92vw, 460px);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--stroke);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(88, 40, 113, 0.12);
        padding: 2rem;
        backdrop-filter: blur(14px);
      }

      .login-shell h1 {
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        margin-bottom: 0.35rem;
      }

      .login-shell p {
        color: var(--muted);
        margin-bottom: 1.5rem;
      }

      .login-form {
        display: grid;
        gap: 0.9rem;
      }

      .login-form input {
        width: 100%;
        border: 1px solid var(--stroke);
        border-radius: 14px;
        padding: 0.9rem 1rem;
        font: inherit;
        background: #fff;
        color: var(--text);
      }

      .login-form input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(139, 46, 173, 0.14);
      }

      .login-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 0.25rem;
      }

      .status {
        min-height: 1.2rem;
        color: #b42318;
        font-size: 0.95rem;
      }

      .top-link {
        display: inline-flex;
        margin-bottom: 1rem;
        text-decoration: none;
        color: var(--accent-strong);
        font-weight: 600;
      }

      .top-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <a class="top-link" href="index.html">Back to home</a>
      <h1>Admin Login</h1>

      <form id="loginForm" class="login-form">
        <input type="text" id="username" placeholder="Username" autocomplete="username" required />
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
        <div class="login-actions">
          <button class="btn btn-primary" type="submit">Admin Login</button>
          <a class="btn btn-ghost" href="index.html">Cancel</a>
        </div>
        <div id="statusMsg" class="status" aria-live="polite"></div>
      </form>
    </main>

    <script>
      const statusMsg = document.getElementById('statusMsg');
      const loginForm = document.getElementById('loginForm');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      async function checkSession() {
        try {
          const res = await fetch('/api/admin/session');
          if (res.ok) {
            const data = await res.json();
            if (data.authenticated) {
              window.location.href = 'index.html';
            }
          }
        } catch {
          // Ignore and stay on login page
        }
      }

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        statusMsg.textContent = '';

        try {
          const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: usernameInput.value.trim(),
              password: passwordInput.value,
            }),
          });

          if (!response.ok) {
            statusMsg.textContent = 'Invalid username or password.';
            return;
          }

          localStorage.setItem('adminUsername', usernameInput.value.trim());
          window.location.href = 'index.html';
        } catch (error) {
          console.error(error);
          statusMsg.textContent = 'Login failed. Please try again.';
        }
      });

      checkSession();
    </script>
  </body>
</html>
